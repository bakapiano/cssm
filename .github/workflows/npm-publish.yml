name: Publish to npm

# Triggered when a GitHub Release is published. Workflow:
#   1. local:   npm version minor -m "release v%s" && git push --follow-tags
#   2. github:  Releases → Draft a new release → pick the new tag → publish
#   3. here:    builds, publishes to npm with provenance, attaches a sigstore
#               attestation that npm displays as a "Provenance" badge.
#
# Provenance requires `id-token: write` (GitHub OIDC) and npm CLI ≥ 9.5.
# It binds the published tarball to *this* commit + workflow run, so users
# can verify on npmjs.com that the bytes really came from this repo's CI.

on:
  release:
    types: [published]
  workflow_dispatch:   # manual trigger for retries / dry runs

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # No `npm install` — `npm publish` just packs the `files` listed in
      # package.json into a tarball and uploads. It doesn't execute our
      # code on the runner, so we don't need deps. Skipping install also
      # sidesteps the `"os": ["win32"]` runtime gate which would reject
      # `npm install` on this Linux runner.
      - name: Publish
        # provenance temporarily disabled while rekor.sigstore.dev is unhealthy
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
